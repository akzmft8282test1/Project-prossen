<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        width: 280px;
        font-family: sans-serif;
        padding: 12px;
        margin: 0;
      }
      .card {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 10px;
      }
      input,
      button {
        width: 100%;
        margin-top: 6px;
        padding: 8px;
        box-sizing: border-box;
      }
      button {
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background-color: #0056b3;
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <!-- 로그인 폼 -->
    <div id="auth-section" class="card">
      <h3>로그인</h3>
      <input type="email" id="email" placeholder="이메일" />
      <input type="password" id="password" placeholder="비밀번호" />
      <button id="btn-login">로그인</button>
    </div>

    <!-- 대시보드 & 화면 효과 제어 -->
    <div id="main-section" class="card hidden">
      <h3>화면 효과 제어</h3>
      <button id="btn-blur">스마트 블러 토글</button>
      <button id="btn-rotate" style="margin-top: 4px">화면 180도 회전</button>
      <button
        id="btn-logout"
        style="background-color: #dc3545; margin-top: 12px">
        로그아웃
      </button>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
